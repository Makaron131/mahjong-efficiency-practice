<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="100" height="100" fill="#2d2d2d" rx="20" ry="20" />

    <!-- 主麻将牌（圆角矩形，翠绿底） -->
    <rect x="15" y="20" width="52" height="60" rx="10" ry="10" fill="#1e4d3b" stroke="#e0e0e0" stroke-width="1.5" />

    <!-- 牌面纹理（细线模拟麻将牌侧面） -->
    <line x1="25" y1="25" x2="57" y2="25" stroke="#b8b8b8" stroke-width="1" opacity="0.4" />
    <line x1="25" y1="30" x2="57" y2="30" stroke="#b8b8b8" stroke-width="1" opacity="0.4" />

    <!-- 汉字"切" (红色) -->
    <text x="38" y="58" font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold"
        fill="#d32f2f" text-anchor="middle" dominant-baseline="middle">切</text>

    <!-- 小点装饰 (模拟牌面纹理) -->
    <circle cx="28" cy="38" r="1.2" fill="#f5f5f5" opacity="0.6" />
    <circle cx="52" cy="48" r="1.2" fill="#f5f5f5" opacity="0.6" />

    <!-- 思维气泡 (浅灰半透明) -->
    <circle cx="70" cy="32" r="16" fill="#e0e0e0" fill-opacity="0.25" stroke="#b0b0b0" stroke-width="1.2"
        stroke-dasharray="3 2" />

    <!-- 气泡内的两个小麻将剪影 (代表选择) -->
    <!-- 第一张小牌 -->
    <rect x="64" y="26" width="6" height="8" rx="1" fill="#c7c7c7" transform="rotate(-5 67 30)" />
    <!-- 第二张小牌 (叠在后面) -->
    <rect x="70" y="28" width="6" height="8" rx="1" fill="#a0a0a0" transform="rotate(8 73 32)" />

    <!-- 牌旁边的问号 (淡灰色) -->
    <text x="85" y="50" font-family="sans-serif" font-size="24" fill="#cccccc" font-weight="bold" text-anchor="middle"
        dominant-baseline="middle">?</text>

    <!-- 极细的装饰线条，增强现代感 -->
    <path d="M20 85 L40 75 L60 85 L80 75" stroke="#4f5b62" stroke-width="0.8" fill="none" opacity="0.4" />
</svg>